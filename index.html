<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/index.css"/>
  <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>

  <title> Dessert Ideas</title>
</head>
<body>
  <div class="container">
  <header>
  <h1>
   Welcome to the Ai dessert idea Generator
  </h1>
  </header>
  <main>

  <div class="form-container">
<form id="dessert-idea-generator">

  <div class="input-row">
    <input 
    type="text" 
    placeholder="Type ingredient or sweet treat"
    class="instructions" 
    id="user-instructions" 
    required
    autocomplete="off"
    />
    <input type="submit" class="button"/>
  </div>


  <small class="example">i.e: Mango, Popcorn, Cookies</small>

</form>
</div>

<div class="food">
  The suggestions of desserts 
</div>
  </main>

   <footer>
    This AI project was coded by <a href="https://github.com/" target ="_blank">Rebecca Dani </a> and is <a href="https://github.com/rebecca967/dessert-idea-generator" target="_blank"> open-sourced</a> on Github
  and is hosted on <a href="https://dessertideagenerator.netlify.app/" target="_blank"> netlify</a> .
  </footer>
  </div>
  <script src="src/index.js"></script>
  
</body>
</html>
